apiVersion: v1
kind: Pod
metadata:
  name: adminer
  labels:
    app: adminer
    types: small
spec:
  containers:
  - name: adminer
    image: adminer:4
    ports:
    - containerPort: 8080
      protocol: TCP
    env:
    - name: POD_HTTP_PORT
      value: "8080"
    - name: POSTGRES_DB
      value: "zenodo"
    - name: POSTGRES_USER
      value: "zenodo"
    - name: POSTGRES_PASSWORD
      value: "zenodo"
    securityContext:
      capabilities:
        add:
          - "SYS_CHROOT"
          - "AUDIT_WRITE"
          - "NET_ADMIN"
  securityContext:
    sysctls:
    - name: "net.ipv4.ping_group_range"
      value: "0 2147483647"
  restartPolicy: Never
