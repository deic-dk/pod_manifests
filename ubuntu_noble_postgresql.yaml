apiVersion: v1
kind: Pod
metadata:
  name: ubuntu-noble-postgresql
  labels:
    app: ubuntu-noble-postgresql
    types: disk2tb-disk4tb
spec:
  containers:
  - name: ubuntu-noble-postgresql
    image: sciencedata/ubuntu_noble_postgresql_sciencedata
    ports:
    - containerPort: 22
      protocol: TCP
    - containerPort: 5432
      protocol: TCP
    env:
    - name: SSH_PUBLIC_KEY
      value: ""
    - name: USERNAME
      value: "sciencedata"
    - name: HOME_SERVER
      value: ""
    - name: SD_UID
      value: ""
    - name: PUBLIC_HOME_SERVER
      value: ""
    - name: POD_EXTRA_PORTS
      value: "5432"
    securityContext:
      capabilities:
        add:
          - "SYS_CHROOT"
          - "AUDIT_WRITE"
          - "NET_ADMIN"
  restartPolicy: Never
